<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#10141e"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="box">
      <rect width="120" height="120" rx="26"/>
    </clipPath>
  </defs>

  <!-- BG -->
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <rect width="120" height="120" rx="26" fill="none" stroke="rgba(56,189,248,0.25)" stroke-width="1.5"/>

  <!-- Grid lines subtle -->
  <g clip-path="url(#box)" opacity="0.04">
    <line x1="0" y1="24" x2="120" y2="24" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="0" y1="48" x2="120" y2="48" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="0" y1="72" x2="120" y2="72" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="0" y1="96" x2="120" y2="96" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="24" y1="0" x2="24" y2="120" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="48" y1="0" x2="48" y2="120" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="72" y1="0" x2="72" y2="120" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="96" y1="0" x2="96" y2="120" stroke="#38bdf8" stroke-width="0.5"/>
  </g>

  <!-- Git trunk line -->
  <line x1="46" y1="92" x2="46" y2="38"
    stroke="url(#iconGrad)" stroke-width="2.5"
    stroke-linecap="round" opacity="0.55"/>

  <!-- Feature branch curve -->
  <path d="M46,66 C46,50 78,56 78,38"
    fill="none"
    stroke="url(#iconGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    opacity="0.9"/>

  <!-- Magnifier -->
  <circle cx="78" cy="38" r="18"
    fill="rgba(56,189,248,0.05)"
    stroke="url(#iconGrad)"
    stroke-width="3"
    filter="url(#glow)"/>

  <!-- Crosshair inside glass -->
  <line x1="78" y1="28" x2="78" y2="48" stroke="rgba(56,189,248,0.3)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="68" y1="38" x2="88" y2="38" stroke="rgba(56,189,248,0.3)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Handle -->
  <line x1="91" y1="51" x2="103" y2="65"
    stroke="url(#iconGrad)"
    stroke-width="3.8"
    stroke-linecap="round"
    filter="url(#glow)"/>

  <!-- Bottom node -->
  <circle cx="46" cy="92" r="7"
    fill="#0d1117"
    stroke="url(#iconGrad)"
    stroke-width="2.5"
    filter="url(#glow)"/>
  <circle cx="46" cy="92" r="3" fill="#38bdf8"/>

  <!-- Branch node -->
  <circle cx="46" cy="66" r="6"
    fill="#0d1117"
    stroke="url(#iconGrad)"
    stroke-width="2.2"
    filter="url(#glow)"/>
  <circle cx="46" cy="66" r="2.5" fill="#818cf8"/>

  <!-- Top node (faded, under magnifier) -->
  <circle cx="46" cy="38" r="5"
    fill="#0d1117"
    stroke="rgba(56,189,248,0.4)"
    stroke-width="1.8"/>
  <circle cx="46" cy="38" r="2" fill="rgba(56,189,248,0.35)"/>

  <!-- hash decoration -->
  <text x="10" y="114"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="9" fill="rgba(56,189,248,0.2)"
    letter-spacing="0.5">a3f8c2e</text>

</svg>
